services:
  # The Nginx server receives traffic from Tailscale and forwards it to your local LMStudio (host.docker.internal:1234).
  nginx:
    image: nginx:latest
    container_name: ingress_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  # The Tailscale container connects your setup to your Tailscale network and the public internet.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: egress_tailscale
    hostname: my-public-gateway
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/tailscale-serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/tailscale-serve.json:ro
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

volumes:
  tailscale-state:
